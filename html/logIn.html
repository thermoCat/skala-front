<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA · 로그인</title>
    <style>
        :root {
            --bg: #0a0a12;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8e8f0;
            --muted: #9a9ab0;
            --accent-1: #7c5cff;
            --accent-2: #00d4ff;
            --accent-3: #ff5c8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 92px 24px 48px;
            overflow-x: hidden;
        }

        /* ── 움직이는 오로라 배경 ── */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .aurora span {
            position: absolute;
            width: 55vmax;
            height: 55vmax;
            border-radius: 50%;
            opacity: 0.3;
            animation: drift 16s ease-in-out infinite alternate;
        }
        .aurora span:nth-child(1) {
            background: radial-gradient(circle, var(--accent-1) 0%, transparent 70%);
            top: -20vmax; left: -12vmax;
        }
        .aurora span:nth-child(2) {
            background: radial-gradient(circle, var(--accent-2) 0%, transparent 70%);
            bottom: -22vmax; right: -14vmax;
            animation-delay: -8s;
        }
        .aurora span:nth-child(3) {
            background: radial-gradient(circle, var(--accent-3) 0%, transparent 70%);
            top: 40%; left: 55%;
            width: 35vmax; height: 35vmax;
            opacity: 0.16;
            animation-delay: -4s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(7vmax, 5vmax) scale(1.2); }
        }

        /* ── 메인 카드 ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: clamp(36px, 6vw, 48px);
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.9s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.8rem;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin-bottom: 20px;
        }
        .badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 12px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        h1 {
            font-size: clamp(1.6rem, 4.5vw, 2.1rem);
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        h1 .gradient {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-1));
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 6s linear infinite;
        }
        @keyframes shine {
            to { background-position: 300% center; }
        }
        .intro {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        /* ── 폼 ── */
        form { margin-top: 28px; }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.93rem;
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        input::placeholder { color: #6b6b80; }
        input:focus {
            outline: none;
            background: rgba(124, 92, 255, 0.08);
            border-color: rgba(124, 92, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.15);
        }

        .error {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 11px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffc0d2;
            background: rgba(255, 92, 138, 0.12);
            border: 1px solid rgba(255, 92, 138, 0.4);
        }
        .error.show { display: flex; animation: shake 0.35s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 6px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-family: inherit;
            font-size: 0.96rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 10px 34px rgba(124, 92, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button[type="submit"]:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 44px rgba(124, 92, 255, 0.55);
        }
        button[type="submit"]:active { transform: translateY(0) scale(0.99); }

        .to-signup {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.86rem;
            color: var(--muted);
        }
        .to-signup a {
            color: var(--accent-2);
            font-weight: 700;
            text-decoration: none;
        }
        .to-signup a:hover { text-decoration: underline; }

        /* 이미 로그인한 상태에서 들어온 경우 */
        .already {
            margin-top: 26px;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .already .who { font-weight: 800; font-size: 1.05rem; }
        .already p { margin-top: 6px; font-size: 0.85rem; color: var(--muted); }
        .already a {
            display: inline-block;
            margin-top: 14px;
            padding: 11px 26px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: relative;
            z-index: 1;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }
        footer a { color: var(--accent-2); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="aurora">
        <span></span><span></span><span></span>
    </div>

    <div id="auth-area"></div>

    <main class="card">
        <div class="badge"><span class="dot"></span>SKALA FRONTEND · LOG IN</div>
        <h1>🔑 <span class="gradient">로그인</span></h1>
        <p class="intro">로그인하면 회원님이 작성한 내용으로 페이지가 채워집니다.</p>

        <!-- 비로그인 상태에서만 폼을 보여준다 -->
        <div data-auth="out">
            <p class="error" id="error">⚠️ <span id="errorText"></span></p>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" name="userId"
                           placeholder="가입할 때 만든 아이디" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
                </div>
                <button type="submit">로그인</button>
            </form>

            <p class="to-signup">
                아직 회원이 아니신가요? <a href="signUp.html">회원가입 하기</a>
            </p>
        </div>

        <!-- 이미 로그인한 상태 -->
        <div class="already" data-auth="in" hidden>
            <p class="who"><span data-personal="name"></span>님, 이미 로그인되어 있습니다.</p>
            <p>로그인 시각: <span data-personal="loginAt"></span></p>
            <a href="index.html">메인 Hub로 가기 →</a>
        </div>
    </main>

    <footer><a href="index.html">← 메인으로 돌아가기</a></footer>

    <script src="../js/auth.js"></script>
    <script>
        var form = document.getElementById("loginForm");
        var errorBox = document.getElementById("error");
        var errorText = document.getElementById("errorText");

        function showError(message) {
            errorText.textContent = message;
            errorBox.classList.remove("show");
            // 같은 메시지가 다시 떠도 흔들림이 보이도록 애니메이션을 되감는다
            void errorBox.offsetWidth;
            errorBox.classList.add("show");
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            var id = document.getElementById("userId").value.trim();
            var pw = document.getElementById("password").value;

            if (!id || !pw) {
                showError("아이디와 비밀번호를 모두 입력해 주세요.");
                return;
            }

            var result = Auth.login(id, pw);
            if (!result.ok) {
                showError(result.reason);
                document.getElementById("password").value = "";
                return;
            }

            location.href = "index.html";
        });
    </script>
</body>
</html>
