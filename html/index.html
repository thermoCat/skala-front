<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA · 환영합니다</title>
    <style>
        :root {
            --bg: #0a0a12;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8e8f0;
            --muted: #9a9ab0;
            --accent-1: #7c5cff;
            --accent-2: #00d4ff;
            --accent-3: #ff5c8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-x: hidden;
            padding: 48px 24px;
        }

        /* ── 움직이는 오로라 배경 ── */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .aurora span {
            position: absolute;
            width: 55vmax;
            height: 55vmax;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.32;
            animation: drift 16s ease-in-out infinite alternate;
        }
        .aurora span:nth-child(1) {
            background: radial-gradient(circle, var(--accent-1), transparent 60%);
            top: -20vmax; left: -12vmax;
        }
        .aurora span:nth-child(2) {
            background: radial-gradient(circle, var(--accent-2), transparent 60%);
            bottom: -22vmax; right: -14vmax;
            animation-delay: -8s;
        }
        .aurora span:nth-child(3) {
            background: radial-gradient(circle, var(--accent-3), transparent 60%);
            top: 40%; left: 55%;
            width: 35vmax; height: 35vmax;
            opacity: 0.18;
            animation-delay: -4s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(7vmax, 5vmax) scale(1.2); }
        }

        /* ── 떠다니는 파티클 ── */
        .particle {
            position: fixed;
            bottom: -10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            animation: rise linear infinite;
            z-index: 0;
        }
        @keyframes rise {
            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        /* ── 메인 카드 ── */
        .card {
            position: relative;
            z-index: 1;
            padding: clamp(48px, 8vw, 80px) clamp(32px, 7vw, 90px);
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.9s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.82rem;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin-bottom: 30px;
            animation: fadeUp 0.9s 0.1s ease both;
        }
        .badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 12px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        h1 {
            font-size: clamp(2.4rem, 7vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.2;
            animation: fadeUp 0.9s 0.2s ease both;
        }
        h1 .gradient {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-1));
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 6s linear infinite;
        }
        @keyframes shine {
            to { background-position: 300% center; }
        }

        .subtitle {
            margin-top: 20px;
            font-size: clamp(1rem, 2.4vw, 1.25rem);
            color: var(--muted);
            animation: fadeUp 0.9s 0.35s ease both;
        }
        .subtitle .typing {
            border-right: 2px solid var(--accent-2);
            padding-right: 4px;
            animation: blink 0.9s step-end infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        .cta {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 44px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 10px 34px rgba(124, 92, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: fadeUp 0.9s 0.5s ease both;
        }
        .cta:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 16px 46px rgba(124, 92, 255, 0.55);
        }
        .cta:active { transform: translateY(-1px) scale(0.99); }

        /* ── 바로가기 ── */
        .links {
            margin-top: 48px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.9s 0.65s ease both;
        }
        .links h2 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin-bottom: 22px;
        }
        .links h2 .accent {
            background: linear-gradient(90deg, var(--accent-2), var(--accent-1));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
        }
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 22px 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }
        .link-card:hover {
            transform: translateY(-6px);
            background: rgba(124, 92, 255, 0.1);
            border-color: rgba(124, 92, 255, 0.45);
            box-shadow: 0 12px 32px rgba(124, 92, 255, 0.28);
        }
        .link-card .link-icon { font-size: 1.7rem; }
        .link-card .link-title { font-weight: 700; font-size: 0.98rem; }
        .link-card .link-sub {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.06em;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: relative;
            z-index: 1;
            margin-top: 36px;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>
    <div class="aurora">
        <span></span><span></span><span></span>
    </div>

    <main class="card">
        <div class="badge"><span class="dot"></span>SKALA FRONTEND</div>
        <h1>환영인사<br><span class="gradient">스칼라에 오신 것을</span><br>환영합니다</h1>
        <p class="subtitle"><span class="typing" id="typing"></span></p>
        <button class="cta" id="cta">🎉 시작하기</button>

        <section class="links">
            <h2><span class="accent">바로가기</span></h2>
            <div class="link-grid">
                <a href="myClass.html" class="link-card">
                    <span class="link-icon">📅</span>
                    <span class="link-title">나의 수업</span>
                    <span class="link-sub">myClass</span>
                </a>
                <a href="myHoliday.html" class="link-card">
                    <span class="link-icon">🏖️</span>
                    <span class="link-title">나의 휴일</span>
                    <span class="link-sub">myHoliday</span>
                </a>
                <a href="myProfile.html" class="link-card">
                    <span class="link-icon">👤</span>
                    <span class="link-title">나의 프로필</span>
                    <span class="link-sub">myProfile</span>
                </a>
                <a href="signUp.html" class="link-card">
                    <span class="link-icon">✍️</span>
                    <span class="link-title">회원가입</span>
                    <span class="link-sub">signUp</span>
                </a>
            </div>
        </section>
    </main>

    <footer>SKALA · Frontend Playground</footer>

    <script>
        // 타이핑 효과
        const phrases = [
            "함께 성장하는 여정이 시작됩니다.",
            "HTML, CSS, JavaScript로 만드는 웹.",
            "오늘도 즐겁게 코딩해 볼까요?"
        ];
        const typingEl = document.getElementById("typing");
        let pi = 0, ci = 0, deleting = false;

        function type() {
            const current = phrases[pi];
            typingEl.textContent = current.slice(0, ci);
            if (!deleting) {
                if (ci < current.length) { ci++; setTimeout(type, 70); }
                else { deleting = true; setTimeout(type, 1800); }
            } else {
                if (ci > 0) { ci--; setTimeout(type, 35); }
                else { deleting = false; pi = (pi + 1) % phrases.length; setTimeout(type, 400); }
            }
        }
        type();

        // 떠다니는 파티클 생성
        for (let i = 0; i < 24; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 3 + 1;
            p.style.width = p.style.height = size + "px";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = Math.random() * 12 + 8 + "s";
            p.style.animationDelay = Math.random() * 10 + "s";
            p.style.opacity = Math.random() * 0.5 + 0.2;
            document.body.appendChild(p);
        }

        // 색종이 폭죽
        const colors = ["#7c5cff", "#00d4ff", "#ff5c8a", "#4ade80", "#facc15"];

        function fireConfetti(x, y) {
            for (let i = 0; i < 40; i++) {
                const c = document.createElement("div");
                c.style.cssText = `
                    position: fixed;
                    left: ${x}px;
                    top: ${y}px;
                    width: ${Math.random() * 8 + 4}px;
                    height: ${Math.random() * 8 + 4}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
                    pointer-events: none;
                    z-index: 999;
                `;
                document.body.appendChild(c);
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 300 + 150;
                c.animate([
                    { transform: "translate(0, 0) rotate(0deg)", opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity + 250}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: 1200 + Math.random() * 600, easing: "cubic-bezier(0.1, 0.8, 0.3, 1)" })
                .onfinish = () => c.remove();
            }
        }

        // 시작하기 버튼 클릭 → 폭죽
        document.getElementById("cta").addEventListener("click", (e) => {
            fireConfetti(e.clientX, e.clientY);
        });

        // 바로가기 카드 클릭 → 폭죽을 터뜨린 뒤 이동
        document.querySelectorAll(".link-card").forEach((card) => {
            card.addEventListener("click", (e) => {
                // 새 탭으로 여는 클릭은 기본 동작을 그대로 둔다
                if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;

                e.preventDefault();
                const rect = card.getBoundingClientRect();
                fireConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
                setTimeout(() => { window.location.href = card.href; }, 700);
            });
        });
    </script>
</body>
</html>
