<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA · 나의 메모</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/myMemo.css">
</head>
<body>
    <div class="aurora"><span></span><span></span><span></span></div>

    <div class="container">
    <div id="auth-area"></div>

    <main class="card">
        <div class="badge"><span class="dot"></span>SKALA FRONTEND · MY MEMO</div>
        <h1>📝 <span data-personal="name" data-fallback="나">나</span>의 <span class="gradient">메모장</span></h1>
        <p class="intro">일과 관련해서 잊지 말아야 할 것들을 짧게 적어두는 공간입니다.</p>

        <section>
            <div data-auth="in" hidden>
                <h2>✏️ <span class="accent">새 메모</span></h2>
                <div class="new-memo">
                    <input type="text" id="memoTitle" maxlength="40" placeholder="제목 (선택)">
                    <textarea id="memoContent" maxlength="500" placeholder="내용을 적어주세요"></textarea>
                    <button type="button" class="add-btn" id="memoAddBtn">➕ 메모 추가</button>
                </div>
                <p class="status-msg" id="statusMsg"></p>

                <div class="memo-list" id="memoList"></div>
            </div>

            <p class="guest-note" data-auth="out" hidden>
                🔒 로그인하면 나만의 메모를 남기고 관리할 수 있습니다.
                <a href="logIn.html">로그인</a> · <a href="signUp.html">회원가입</a>
            </p>
        </section>
    </main>

    <footer><a href="index.html">← 메인으로 돌아가기</a></footer>
    </div>

    <script src="../js/core/auth.js"></script>
    <script>
        const statusMsg = document.getElementById("statusMsg");
        function showMsg(text, kind) {
            statusMsg.textContent = text;
            statusMsg.className = "status-msg show " + kind;
        }

        function myMemos() {
            const user = Auth.currentUser();
            return user ? Auth.getMemos(user.userId) : [];
        }
        function persistMemos(list) {
            const user = Auth.currentUser();
            if (!user) return true;
            const r = Auth.saveMemos(user.userId, list);
            if (!r.ok) {
                showMsg(r.full ? "저장 공간이 가득 찼습니다. 메모를 몇 개 지우고 다시 시도해 주세요." : "저장하지 못했습니다.", "error");
                return false;
            }
            return true;
        }

        const memoList = document.getElementById("memoList");

        function renderMemoList() {
            // 최근 메모가 위로 오도록
            const list = myMemos().slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
            memoList.replaceChildren();

            if (!list.length) {
                memoList.append(Object.assign(document.createElement("p"), {
                    className: "memo-empty",
                    textContent: "아직 작성한 메모가 없습니다. 위에서 첫 메모를 남겨보세요 📝"
                }));
                return;
            }

            list.forEach((memo) => {
                const card = document.createElement("div");
                card.className = "memo-card";

                const head = document.createElement("div");
                head.className = "memo-head";
                const date = document.createElement("span");
                date.className = "memo-date";
                date.textContent = memo.createdAt ? new Date(memo.createdAt).toLocaleString("ko-KR") : "";
                const del = document.createElement("button");
                del.type = "button";
                del.className = "del-btn";
                del.textContent = "🗑️ 삭제";
                del.addEventListener("click", () => {
                    if (!confirm("이 메모를 삭제할까요?")) return;
                    const left = myMemos().filter((m) => m.id !== memo.id);
                    if (persistMemos(left)) {
                        renderMemoList();
                        showMsg("메모를 삭제했습니다.", "ok");
                    }
                });
                head.append(date, del);

                const titleInput = document.createElement("input");
                titleInput.type = "text";
                titleInput.className = "memo-title-input";
                titleInput.maxLength = 40;
                titleInput.value = memo.title || "";
                titleInput.placeholder = "제목 (선택)";
                titleInput.addEventListener("change", () => {
                    const l = myMemos();
                    const t = l.find((m) => m.id === memo.id);
                    if (!t) return;
                    t.title = titleInput.value.trim();
                    if (persistMemos(l)) showMsg("제목을 저장했습니다.", "ok");
                });

                const contentArea = document.createElement("textarea");
                contentArea.className = "memo-content-input";
                contentArea.maxLength = 500;
                contentArea.value = memo.content || "";
                contentArea.addEventListener("change", () => {
                    const l = myMemos();
                    const t = l.find((m) => m.id === memo.id);
                    if (!t) return;
                    t.content = contentArea.value.trim();
                    if (persistMemos(l)) showMsg("내용을 저장했습니다.", "ok");
                });

                card.append(head, titleInput, contentArea);
                memoList.append(card);
            });
        }

        document.getElementById("memoAddBtn").addEventListener("click", () => {
            const content = document.getElementById("memoContent").value.trim();
            if (!content) {
                showMsg("내용을 입력해 주세요.", "error");
                return;
            }
            const title = document.getElementById("memoTitle").value.trim();

            const list = myMemos();
            list.push({
                id: Date.now() + "-" + Math.random().toString(36).slice(2, 8),
                title: title,
                content: content,
                createdAt: new Date().toISOString()
            });

            if (persistMemos(list)) {
                document.getElementById("memoTitle").value = "";
                document.getElementById("memoContent").value = "";
                renderMemoList();
                showMsg("메모를 추가했습니다.", "ok");
            }
        });

        document.addEventListener("auth:change", renderMemoList);
        renderMemoList();
    </script>
</body>
</html>
