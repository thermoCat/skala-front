<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA · 나의 메모</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 92px 24px 80px;
            overflow-x: hidden;
        }

        .card {
            position: relative; z-index: 1; width: 100%; max-width: 720px;
            padding: clamp(36px, 5vw, 56px); border-radius: 28px;
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.9s ease both;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 7px 18px;
            border-radius: 999px; border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04); font-size: 0.82rem;
            letter-spacing: 0.16em; color: var(--muted); margin-bottom: 22px;
        }

        h1 { font-size: clamp(1.7rem, 4.5vw, 2.4rem); font-weight: 900; letter-spacing: -0.02em; }
        .intro { margin-top: 12px; color: var(--muted); font-size: 0.98rem; }

        section {
            margin-top: 42px; padding-top: 34px; border-top: 1px solid var(--border);
            animation: fadeUp 0.9s 0.15s ease both;
        }
        h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.01em; }
        .desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }

        /* ── 새 메모 작성 ── */
        .new-memo {
            padding: 18px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
        }
        .new-memo input, .new-memo textarea {
            width: 100%; padding: 10px 13px; border-radius: 11px; font-family: inherit;
            font-size: 0.9rem; color: var(--text); background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border); transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 10px;
        }
        .new-memo textarea { min-height: 90px; resize: vertical; line-height: 1.6; }
        .new-memo input::placeholder, .new-memo textarea::placeholder { color: #6b6b80; }
        .new-memo input:focus, .new-memo textarea:focus {
            outline: none; background: rgba(124, 92, 255, 0.08);
            border-color: rgba(124, 92, 255, 0.6); box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.15);
        }
        .add-btn {
            padding: 11px 22px; border-radius: 12px; border: none; font-family: inherit;
            font-size: 0.9rem; font-weight: 700; color: #fff; cursor: pointer;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 8px 24px rgba(124, 92, 255, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .add-btn:hover { transform: translateY(-2px); }

        /* ── 메모 목록 ── */
        .memo-list { display: grid; gap: 14px; margin-top: 26px; }
        .memo-card {
            padding: 16px 18px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            transition: border-color 0.25s ease;
        }
        .memo-card:hover { border-color: rgba(124, 92, 255, 0.35); }
        .memo-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .memo-date { font-size: 0.74rem; color: var(--muted); }
        .memo-title-input {
            width: 100%; padding: 8px 12px; border-radius: 10px; font-family: inherit;
            font-size: 0.94rem; font-weight: 800; color: var(--text);
            background: rgba(255, 255, 255, 0.04); border: 1px solid transparent;
            margin-bottom: 8px; transition: border-color 0.2s ease, background 0.2s ease;
        }
        .memo-content-input {
            width: 100%; padding: 8px 12px; border-radius: 10px; font-family: inherit;
            font-size: 0.86rem; color: var(--muted); line-height: 1.6; min-height: 56px; resize: vertical;
            background: rgba(255, 255, 255, 0.04); border: 1px solid transparent;
            transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }
        .memo-title-input:hover, .memo-content-input:hover { border-color: var(--border); }
        .memo-title-input:focus, .memo-content-input:focus {
            outline: none; color: var(--text); background: rgba(124, 92, 255, 0.1); border-color: rgba(124, 92, 255, 0.6);
        }
        .del-btn {
            flex-shrink: 0; padding: 6px 12px; border-radius: 10px; border: 1px solid var(--border);
            font-family: inherit; font-size: 0.76rem; font-weight: 700; color: var(--muted); cursor: pointer;
            background: rgba(255, 255, 255, 0.04); transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .del-btn:hover { color: #ffc0d2; background: rgba(255, 92, 138, 0.14); border-color: rgba(255, 92, 138, 0.45); }
        .memo-empty {
            padding: 34px 22px; border-radius: 16px; text-align: center; font-size: 0.92rem;
            color: var(--muted); background: rgba(255, 255, 255, 0.03); border: 1px dashed var(--border);
        }

        .status-msg {
            display: none; margin-top: 14px; padding: 11px 15px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600;
        }
        .status-msg.show { display: block; }
        .status-msg.error { color: #ffc0d2; background: rgba(255, 92, 138, 0.12); border: 1px solid rgba(255, 92, 138, 0.4); }
        .status-msg.ok { color: #b8f5cd; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.35); }

        .guest-note {
            padding: 20px 24px; border-radius: 18px; font-size: 0.9rem; color: var(--muted);
            background: rgba(124, 92, 255, 0.07); border: 1px dashed rgba(124, 92, 255, 0.4);
        }
        .guest-note a { color: var(--accent-2); font-weight: 700; text-decoration: none; }
        .guest-note a:hover { text-decoration: underline; }

        footer { position: relative; z-index: 1; margin-top: 36px; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.08em; }
    </style>
</head>
<body>
    <div class="aurora"><span></span><span></span><span></span></div>

    <div id="auth-area"></div>

    <main class="card">
        <div class="badge"><span class="dot"></span>SKALA FRONTEND · MY MEMO</div>
        <h1>📝 <span data-personal="name" data-fallback="나">나</span>의 <span class="gradient">메모장</span></h1>
        <p class="intro">일과 관련해서 잊지 말아야 할 것들을 짧게 적어두는 공간입니다.</p>

        <section>
            <div data-auth="in" hidden>
                <h2>✏️ <span class="accent">새 메모</span></h2>
                <div class="new-memo">
                    <input type="text" id="memoTitle" maxlength="40" placeholder="제목 (선택)">
                    <textarea id="memoContent" maxlength="500" placeholder="내용을 적어주세요"></textarea>
                    <button type="button" class="add-btn" id="memoAddBtn">➕ 메모 추가</button>
                </div>
                <p class="status-msg" id="statusMsg"></p>

                <div class="memo-list" id="memoList"></div>
            </div>

            <p class="guest-note" data-auth="out" hidden>
                🔒 로그인하면 나만의 메모를 남기고 관리할 수 있습니다.
                <a href="logIn.html">로그인</a> · <a href="signUp.html">회원가입</a>
            </p>
        </section>
    </main>

    <footer><a href="index.html">← 메인으로 돌아가기</a></footer>

    <script src="../js/core/auth.js"></script>
    <script>
        const statusMsg = document.getElementById("statusMsg");
        function showMsg(text, kind) {
            statusMsg.textContent = text;
            statusMsg.className = "status-msg show " + kind;
        }

        function myMemos() {
            const user = Auth.currentUser();
            return user ? Auth.getMemos(user.userId) : [];
        }
        function persistMemos(list) {
            const user = Auth.currentUser();
            if (!user) return true;
            const r = Auth.saveMemos(user.userId, list);
            if (!r.ok) {
                showMsg(r.full ? "저장 공간이 가득 찼습니다. 메모를 몇 개 지우고 다시 시도해 주세요." : "저장하지 못했습니다.", "error");
                return false;
            }
            return true;
        }

        const memoList = document.getElementById("memoList");

        function renderMemoList() {
            // 최근 메모가 위로 오도록
            const list = myMemos().slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
            memoList.replaceChildren();

            if (!list.length) {
                memoList.append(Object.assign(document.createElement("p"), {
                    className: "memo-empty",
                    textContent: "아직 작성한 메모가 없습니다. 위에서 첫 메모를 남겨보세요 📝"
                }));
                return;
            }

            list.forEach((memo) => {
                const card = document.createElement("div");
                card.className = "memo-card";

                const head = document.createElement("div");
                head.className = "memo-head";
                const date = document.createElement("span");
                date.className = "memo-date";
                date.textContent = memo.createdAt ? new Date(memo.createdAt).toLocaleString("ko-KR") : "";
                const del = document.createElement("button");
                del.type = "button";
                del.className = "del-btn";
                del.textContent = "🗑️ 삭제";
                del.addEventListener("click", () => {
                    if (!confirm("이 메모를 삭제할까요?")) return;
                    const left = myMemos().filter((m) => m.id !== memo.id);
                    if (persistMemos(left)) {
                        renderMemoList();
                        showMsg("메모를 삭제했습니다.", "ok");
                    }
                });
                head.append(date, del);

                const titleInput = document.createElement("input");
                titleInput.type = "text";
                titleInput.className = "memo-title-input";
                titleInput.maxLength = 40;
                titleInput.value = memo.title || "";
                titleInput.placeholder = "제목 (선택)";
                titleInput.addEventListener("change", () => {
                    const l = myMemos();
                    const t = l.find((m) => m.id === memo.id);
                    if (!t) return;
                    t.title = titleInput.value.trim();
                    if (persistMemos(l)) showMsg("제목을 저장했습니다.", "ok");
                });

                const contentArea = document.createElement("textarea");
                contentArea.className = "memo-content-input";
                contentArea.maxLength = 500;
                contentArea.value = memo.content || "";
                contentArea.addEventListener("change", () => {
                    const l = myMemos();
                    const t = l.find((m) => m.id === memo.id);
                    if (!t) return;
                    t.content = contentArea.value.trim();
                    if (persistMemos(l)) showMsg("내용을 저장했습니다.", "ok");
                });

                card.append(head, titleInput, contentArea);
                memoList.append(card);
            });
        }

        document.getElementById("memoAddBtn").addEventListener("click", () => {
            const content = document.getElementById("memoContent").value.trim();
            if (!content) {
                showMsg("내용을 입력해 주세요.", "error");
                return;
            }
            const title = document.getElementById("memoTitle").value.trim();

            const list = myMemos();
            list.push({
                id: Date.now() + "-" + Math.random().toString(36).slice(2, 8),
                title: title,
                content: content,
                createdAt: new Date().toISOString()
            });

            if (persistMemos(list)) {
                document.getElementById("memoTitle").value = "";
                document.getElementById("memoContent").value = "";
                renderMemoList();
                showMsg("메모를 추가했습니다.", "ok");
            }
        });

        document.addEventListener("auth:change", renderMemoList);
        renderMemoList();
    </script>
</body>
</html>
