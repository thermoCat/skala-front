<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA · 나의 여행지</title>
    <style>
        :root {
            --bg: #0a0a12;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8e8f0;
            --muted: #9a9ab0;
            --accent-1: #7c5cff;
            --accent-2: #00d4ff;
            --accent-3: #ff5c8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 92px 24px 80px;
            overflow-x: hidden;
        }

        /* ── 움직이는 오로라 배경 ── */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .aurora span {
            position: absolute;
            width: 55vmax;
            height: 55vmax;
            border-radius: 50%;
            opacity: 0.3;
            animation: drift 16s ease-in-out infinite alternate;
        }
        .aurora span:nth-child(1) {
            background: radial-gradient(circle, var(--accent-1) 0%, transparent 70%);
            top: -20vmax; left: -12vmax;
        }
        .aurora span:nth-child(2) {
            background: radial-gradient(circle, var(--accent-2) 0%, transparent 70%);
            bottom: -22vmax; right: -14vmax;
            animation-delay: -8s;
        }
        .aurora span:nth-child(3) {
            background: radial-gradient(circle, var(--accent-3) 0%, transparent 70%);
            top: 40%; left: 55%;
            width: 35vmax; height: 35vmax;
            opacity: 0.16;
            animation-delay: -4s;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(7vmax, 5vmax) scale(1.2); }
        }

        /* ── 메인 카드 ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 760px;
            padding: clamp(36px, 5vw, 56px);
            border-radius: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            animation: fadeUp 0.9s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.82rem;
            letter-spacing: 0.16em;
            color: var(--muted);
            margin-bottom: 22px;
        }
        .badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 12px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        h1 {
            font-size: clamp(1.7rem, 4.5vw, 2.4rem);
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        h1 .gradient {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-1));
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 6s linear infinite;
        }
        @keyframes shine {
            to { background-position: 300% center; }
        }

        .intro {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.98rem;
        }

        /* ── 섹션 ── */
        section {
            margin-top: 42px;
            padding-top: 34px;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.9s 0.15s ease both;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        h2 .accent {
            background: linear-gradient(90deg, var(--accent-2), var(--accent-1));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .desc {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 18px;
        }

        /* ── 업로드 영역 ── */
        .uploader {
            display: block;
            padding: 30px 24px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            background: rgba(124, 92, 255, 0.06);
            border: 2px dashed rgba(124, 92, 255, 0.45);
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
        }
        .uploader:hover,
        .uploader.dragover {
            background: rgba(124, 92, 255, 0.14);
            border-color: rgba(124, 92, 255, 0.8);
            transform: translateY(-3px);
        }
        .uploader .up-icon { font-size: 2rem; }
        .uploader .up-title {
            margin-top: 8px;
            font-weight: 800;
            font-size: 1rem;
        }
        .uploader .up-sub {
            margin-top: 4px;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .uploader input[type="file"] { display: none; }

        .upload-msg {
            display: none;
            margin-top: 12px;
            padding: 11px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .upload-msg.show { display: block; }
        .upload-msg.error {
            color: #ffc0d2;
            background: rgba(255, 92, 138, 0.12);
            border: 1px solid rgba(255, 92, 138, 0.4);
        }
        .upload-msg.ok {
            color: #b8f5cd;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* ── 사진 앨범 ── */
        .album {
            display: grid;
            gap: 22px;
            margin-top: 24px;
        }
        figure {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        figure:hover {
            transform: translateY(-6px);
            border-color: rgba(124, 92, 255, 0.45);
            box-shadow: 0 16px 40px rgba(124, 92, 255, 0.25);
        }
        figure img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            /* 파일이 없어도 자리와 톤이 유지되도록 */
            background: linear-gradient(135deg, rgba(124, 92, 255, 0.22), rgba(0, 212, 255, 0.14));
            color: var(--muted);
            font-size: 0.85rem;
        }
        figcaption {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 14px 16px 16px;
        }
        .post-title {
            padding: 8px 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.94rem;
            font-weight: 800;
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .post-content {
            padding: 8px 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.84rem;
            line-height: 1.6;
            min-height: 46px;
            resize: vertical;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }
        .post-title:hover,
        .post-content:hover { border-color: var(--border); }
        .post-title:focus,
        .post-content:focus {
            outline: none;
            color: var(--text);
            background: rgba(124, 92, 255, 0.1);
            border-color: rgba(124, 92, 255, 0.6);
        }
        .post-title::placeholder,
        .post-content::placeholder { color: #6b6b80; }
        .post-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .post-date {
            font-size: 0.72rem;
            color: var(--muted);
        }
        .del-btn {
            flex-shrink: 0;
            padding: 7px 13px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .del-btn:hover {
            color: #ffc0d2;
            background: rgba(255, 92, 138, 0.14);
            border-color: rgba(255, 92, 138, 0.45);
        }

        .album-empty {
            padding: 34px 22px;
            border-radius: 16px;
            text-align: center;
            font-size: 0.92rem;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border);
        }

        .guest-note {
            padding: 20px 24px;
            border-radius: 18px;
            font-size: 0.9rem;
            color: var(--muted);
            background: rgba(124, 92, 255, 0.07);
            border: 1px dashed rgba(124, 92, 255, 0.4);
        }
        .guest-note a { color: var(--accent-2); font-weight: 700; text-decoration: none; }
        .guest-note a:hover { text-decoration: underline; }

        /* ── 업로드 전 제목·내용 입력 창 ── */
        dialog#uploadDialog {
            width: min(560px, 92vw);
            max-height: 86vh;
            overflow-y: auto;
            margin: auto;
            padding: 0;
            border: none;
            border-radius: 24px;
            color: var(--text);
            background: #12121c;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.6);
        }
        dialog#uploadDialog::backdrop {
            background: rgba(5, 5, 10, 0.65);
            backdrop-filter: blur(4px);
        }
        .dlg-body { padding: 30px; }
        .dlg-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }
        .dlg-sub {
            font-size: 0.84rem;
            color: var(--muted);
            margin-bottom: 20px;
        }
        .pending-list { display: grid; gap: 16px; }
        .pending-item {
            display: grid;
            grid-template-columns: 84px 1fr;
            gap: 14px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }
        .pending-item img {
            width: 84px;
            height: 84px;
            border-radius: 10px;
            object-fit: cover;
        }
        .pending-fields { display: grid; gap: 8px; }
        .pending-fields input,
        .pending-fields textarea {
            width: 100%;
            padding: 8px 11px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.86rem;
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .pending-fields textarea { min-height: 50px; resize: vertical; line-height: 1.5; }
        .pending-fields input::placeholder,
        .pending-fields textarea::placeholder { color: #6b6b80; }
        .pending-fields input:focus,
        .pending-fields textarea:focus {
            outline: none;
            background: rgba(124, 92, 255, 0.08);
            border-color: rgba(124, 92, 255, 0.6);
        }
        @media (max-width: 480px) {
            .pending-item { grid-template-columns: 1fr; }
            .pending-item img { width: 100%; height: 140px; }
        }
        .dlg-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
            position: sticky;
            bottom: -30px;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            background: #12121c;
        }
        .dlg-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
        }
        .dlg-save {
            color: #fff;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            box-shadow: 0 8px 26px rgba(124, 92, 255, 0.4);
        }
        .dlg-save:hover { transform: translateY(-2px); }
        .dlg-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .dlg-cancel {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border) !important;
        }
        .dlg-cancel:hover { background: rgba(255, 255, 255, 0.1); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: relative;
            z-index: 1;
            margin-top: 36px;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }
        footer a { color: var(--accent-2); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="aurora">
        <span></span><span></span><span></span>
    </div>

    <div id="auth-area"></div>

    <main class="card">
        <div class="badge"><span class="dot"></span>SKALA FRONTEND · MY TRIP</div>
        <h1>🌍 <span data-personal="name" data-fallback="나">나</span>의
            <span class="gradient">여행 앨범</span> 📷</h1>
        <p class="intro">여행지에서 담아온 사진을 모았습니다.</p>

        <section>
            <h2>📷 <span class="accent">여행 사진</span></h2>

            <!-- 로그인한 회원만 자기 사진을 올릴 수 있다 -->
            <div data-auth="in" hidden>
                <p class="desc">사진을 고르면 제목과 내용을 적는 창이 뜹니다. 올린 뒤에도 눌러서 바꾸거나 삭제할 수 있습니다.</p>

                <label class="uploader" id="uploader">
                    <input type="file" id="fileInput" accept="image/*" multiple>
                    <p class="up-icon">📤</p>
                    <p class="up-title">내 컴퓨터에서 사진 올리기</p>
                    <p class="up-sub">여기를 누르거나 사진을 끌어다 놓으세요 · 여러 장 한 번에 가능</p>
                </label>

                <p class="upload-msg" id="uploadMsg"></p>
            </div>

            <p class="guest-note" data-auth="out" hidden>
                🔒 지금은 로그인하지 않아 예시 사진만 보입니다.
                <a href="logIn.html">로그인</a>하면 내 컴퓨터에 있는 사진을 직접 올려
                나만의 앨범을 만들 수 있습니다.
                아직 계정이 없다면 <a href="signUp.html">회원가입</a>부터 해주세요.
            </p>

            <div class="album" id="album"></div>
        </section>
    </main>

    <footer><a href="index.html">← 메인으로 돌아가기</a></footer>

    <!-- 사진을 올리기 전 제목·내용을 입력받는 창 -->
    <dialog id="uploadDialog">
        <div class="dlg-body">
            <p class="dlg-title">📷 사진 정보 입력</p>
            <p class="dlg-sub">고른 사진마다 간단한 제목과 내용을 적어주세요. 제목을 비워두면 파일명이 쓰입니다.</p>
            <div class="pending-list" id="pendingList"></div>
            <div class="dlg-actions">
                <button type="button" class="dlg-cancel" id="uploadCancelBtn">취소</button>
                <button type="button" class="dlg-save" id="uploadSaveBtn">게시하기</button>
            </div>
        </div>
    </dialog>

    <script src="../js/auth.js"></script>
    <script src="../js/alarms.js"></script>
    <script>
        // 비로그인 상태에서 보여줄 예시 사진 (media 폴더에 파일을 두면 나타난다)
        const SAMPLE_PHOTOS = [
            { src: "../media/lijiang-gorge.jpg", caption: "리장 호도협 (2025년)",
              alt: "중국 리장 호도협의 웅장한 협곡 풍경" },
            { src: "../media/cebu-night.jpg", caption: "세부 밤 스카이라인 (2024년)",
              alt: "필리핀 세부의 불빛이 가득한 밤 스카이라인" },
            { src: "../media/hokkaido.jpg", caption: "홋카이도 대설산 (2025년)",
              alt: "눈으로 덮인 홋카이도 대설산의 능선" }
        ];

        // 원본 사진은 수 MB라 그대로 두면 저장 공간이 금방 찬다.
        // 긴 변을 1600px로 줄이고 JPEG로 다시 인코딩해 200KB 안팎으로 만든다.
        const MAX_SIDE = 1600;
        const QUALITY = 0.8;

        function downscale(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
                    const canvas = document.createElement("canvas");
                    canvas.width = Math.round(img.width * scale);
                    canvas.height = Math.round(img.height * scale);
                    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL("image/jpeg", QUALITY));
                };
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error(file.name + " 은(는) 사진으로 읽을 수 없습니다."));
                };
                img.src = url;
            });
        }

        const album = document.getElementById("album");
        const msgBox = document.getElementById("uploadMsg");

        function showMsg(text, kind) {
            msgBox.textContent = text;
            msgBox.className = "upload-msg show " + kind;
        }
        function clearMsg() {
            msgBox.className = "upload-msg";
        }

        function myPhotos() {
            const user = Auth.currentUser();
            return user ? Auth.getPhotos(user.userId) : [];
        }

        function persist(photos) {
            const user = Auth.currentUser();
            if (!user) return true;
            const result = Auth.savePhotos(user.userId, photos);
            if (!result.ok) {
                showMsg(result.full
                    ? "저장 공간이 가득 찼습니다. 기존 사진을 몇 장 지우고 다시 올려주세요."
                    : "사진을 저장하지 못했습니다.", "error");
                return false;
            }
            return true;
        }

        function renderAlbum() {
            const user = Auth.currentUser();
            album.replaceChildren();

            // 비로그인: 예시 사진만 보여준다
            if (!user) {
                SAMPLE_PHOTOS.forEach((photo) => {
                    const fig = document.createElement("figure");
                    const img = document.createElement("img");
                    img.src = photo.src;
                    img.alt = photo.alt;
                    const cap = document.createElement("figcaption");
                    const text = document.createElement("p");
                    text.className = "post-title";
                    text.style.background = "none";
                    text.textContent = photo.caption;
                    cap.append(text);
                    fig.append(img, cap);
                    album.append(fig);
                });
                return;
            }

            const photos = myPhotos();
            if (!photos.length) {
                const empty = document.createElement("p");
                empty.className = "album-empty";
                empty.textContent = "아직 올린 사진이 없습니다. 위에서 첫 사진을 올려보세요 📷";
                album.append(empty);
                return;
            }

            // 최근에 올린 사진이 위로 오도록
            [...photos].reverse().forEach((photo) => {
                const fig = document.createElement("figure");

                const img = document.createElement("img");
                img.src = photo.dataUrl;
                img.alt = photo.title || photo.caption || "내가 올린 여행 사진";

                const cap = document.createElement("figcaption");

                const titleInput = document.createElement("input");
                titleInput.type = "text";
                titleInput.className = "post-title";
                titleInput.maxLength = 40;
                titleInput.value = photo.title || photo.caption || "";
                titleInput.placeholder = "제목을 입력하세요";
                titleInput.addEventListener("change", () => {
                    const list = myPhotos();
                    const target = list.find((p) => p.id === photo.id);
                    if (!target) return;
                    target.title = titleInput.value.trim();
                    if (persist(list)) showMsg("제목을 저장했습니다.", "ok");
                });

                const contentArea = document.createElement("textarea");
                contentArea.className = "post-content";
                contentArea.maxLength = 200;
                contentArea.value = photo.content || "";
                contentArea.placeholder = "사진에 대한 내용을 적어주세요";
                contentArea.addEventListener("change", () => {
                    const list = myPhotos();
                    const target = list.find((p) => p.id === photo.id);
                    if (!target) return;
                    target.content = contentArea.value.trim();
                    if (persist(list)) showMsg("내용을 저장했습니다.", "ok");
                });

                const meta = document.createElement("div");
                meta.className = "post-meta";

                const date = document.createElement("span");
                date.className = "post-date";
                date.textContent = photo.addedAt
                    ? new Date(photo.addedAt).toLocaleDateString("ko-KR")
                    : "";

                const del = document.createElement("button");
                del.type = "button";
                del.className = "del-btn";
                del.textContent = "🗑️ 삭제";
                del.addEventListener("click", () => {
                    if (!confirm("이 사진 게시물을 삭제할까요?")) return;
                    const left = myPhotos().filter((p) => p.id !== photo.id);
                    if (persist(left)) {
                        renderAlbum();
                        showMsg("게시물을 삭제했습니다.", "ok");
                    }
                });

                meta.append(date, del);
                cap.append(titleInput, contentArea, meta);
                fig.append(img, cap);
                album.append(fig);
            });
        }

        // ── 업로드 전 제목·내용을 입력받는 창 ──
        const uploadDialog = document.getElementById("uploadDialog");
        const pendingList = document.getElementById("pendingList");
        const uploadSaveBtn = document.getElementById("uploadSaveBtn");
        let pending = []; // [{ file, previewUrl }]

        function pickImageFiles(fileList) {
            return [...fileList].filter((f) => f.type.startsWith("image/"));
        }

        function openUploadDialog(files) {
            pending = files.map((file) => ({ file, previewUrl: URL.createObjectURL(file) }));

            pendingList.replaceChildren(
                ...pending.map(({ file, previewUrl }) => {
                    const row = document.createElement("div");
                    row.className = "pending-item";

                    const img = document.createElement("img");
                    img.src = previewUrl;
                    img.alt = "";

                    const fields = document.createElement("div");
                    fields.className = "pending-fields";

                    const title = document.createElement("input");
                    title.type = "text";
                    title.maxLength = 40;
                    title.placeholder = "제목";
                    title.value = file.name.replace(/\.[^.]+$/, "");
                    title.dataset.role = "title";

                    const content = document.createElement("textarea");
                    content.maxLength = 200;
                    content.placeholder = "사진에 대한 간단한 내용을 적어주세요";
                    content.dataset.role = "content";

                    fields.append(title, content);
                    row.append(img, fields);
                    return row;
                })
            );

            uploadDialog.showModal();
        }

        function closeUploadDialog() {
            uploadDialog.close();
        }

        // 창을 닫으면(취소 포함) 미리보기용 임시 URL을 정리한다
        uploadDialog.addEventListener("close", () => {
            pending.forEach(({ previewUrl }) => URL.revokeObjectURL(previewUrl));
            pending = [];
            pendingList.replaceChildren();
        });

        document.getElementById("uploadCancelBtn").addEventListener("click", closeUploadDialog);

        uploadSaveBtn.addEventListener("click", async () => {
            const rows = [...pendingList.querySelectorAll(".pending-item")];
            const entries = rows.map((row, i) => ({
                file: pending[i].file,
                title: row.querySelector("[data-role='title']").value.trim()
                    || pending[i].file.name.replace(/\.[^.]+$/, ""),
                content: row.querySelector("[data-role='content']").value.trim()
            }));

            uploadSaveBtn.disabled = true;
            uploadSaveBtn.textContent = "저장하는 중…";

            const photos = myPhotos();
            let added = 0;
            let lastError = "";

            for (const entry of entries) {
                try {
                    const dataUrl = await downscale(entry.file);
                    photos.push({
                        id: Date.now() + "-" + Math.random().toString(36).slice(2, 8),
                        dataUrl: dataUrl,
                        title: entry.title,
                        content: entry.content,
                        addedAt: new Date().toISOString()
                    });
                    added++;
                } catch (e) {
                    lastError = e.message;
                }
            }

            uploadSaveBtn.disabled = false;
            uploadSaveBtn.textContent = "게시하기";

            if (!added) {
                showMsg(lastError || "사진을 처리하지 못했습니다.", "error");
                return;
            }
            if (!persist(photos)) return;

            closeUploadDialog();
            renderAlbum();
            showMsg(
                `사진 ${added}장을 앨범에 게시했습니다.` + (lastError ? ` (일부 실패: ${lastError})` : ""),
                "ok"
            );
        });

        // 파일 선택
        const fileInput = document.getElementById("fileInput");
        fileInput.addEventListener("change", () => {
            const files = pickImageFiles(fileInput.files);
            if (files.length) openUploadDialog(files);
            else showMsg("사진 파일만 올릴 수 있습니다.", "error");
            // 같은 파일을 다시 골라도 change가 발생하도록 비워둔다
            fileInput.value = "";
        });

        // 끌어다 놓기
        const uploader = document.getElementById("uploader");
        ["dragenter", "dragover"].forEach((type) => {
            uploader.addEventListener(type, (e) => {
                e.preventDefault();
                uploader.classList.add("dragover");
            });
        });
        ["dragleave", "drop"].forEach((type) => {
            uploader.addEventListener(type, () => uploader.classList.remove("dragover"));
        });
        uploader.addEventListener("drop", (e) => {
            e.preventDefault();
            const files = pickImageFiles(e.dataTransfer.files);
            if (files.length) openUploadDialog(files);
            else showMsg("사진 파일만 올릴 수 있습니다.", "error");
        });

        // 로그인·로그아웃할 때마다 앨범을 다시 그린다
        document.addEventListener("auth:change", () => {
            clearMsg();
            renderAlbum();
        });
    </script>
</body>
</html>
